# Estende as regras padrão do Gitleaks (cobrem AWS, GitHub, OpenAI, Google/Gemini
# — AIza..., chaves privadas, tokens genéricos) e adiciona uma allowlist para os
# placeholders e chaves mascaradas que aparecem na documentação/exemplos.
[extend]
useDefault = true

[allowlist]
description = "Placeholders e chaves mascaradas (não são segredos reais)"
regexes = [
  '''sua_chave_do_aistudio_aqui''',
  '''sua_chave_real''',
  '''your_gemini_api_key_here''',
  '''AIza\*{4,}[A-Za-z0-9]*''',
]
paths = [
  '''\.env\.local\.example''',
  '''README\.md''',
]
